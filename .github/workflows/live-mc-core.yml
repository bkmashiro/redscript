name: Live MC Core Oracle

on:
  workflow_dispatch:
    inputs:
      require_online:
        description: 'Fail instead of skip when no live Paper/TestHarness config is available'
        type: boolean
        default: false
  schedule:
    - cron: '17 3 * * *'

jobs:
  live-mc-core:
    name: Manual/nightly Paper TestHarness oracle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MC_HOST: ${{ vars.MC_HOST || 'localhost' }}
      MC_PORT: ${{ vars.MC_PORT || '25561' }}
      MC_SERVER_DIR: ${{ vars.MC_SERVER_DIR }}
      REQUIRE_ONLINE_INPUT: ${{ inputs.require_online || false }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Check live oracle environment
        id: live-env
        shell: bash
        run: |
          if [ -z "${MC_SERVER_DIR}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No MC_SERVER_DIR repository variable is configured; live Paper oracle will be skipped."
            exit 0
          fi
          if curl -fsS --max-time 5 "http://${MC_HOST}:${MC_PORT}/status" >/tmp/redscript-mc-status.json; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Harness online at http://${MC_HOST}:${MC_PORT}"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Harness is not reachable at http://${MC_HOST}:${MC_PORT}."
          fi

      - name: Fail if explicit online proof was requested but unavailable
        if: steps.live-env.outputs.configured != 'true' && env.REQUIRE_ONLINE_INPUT == 'true'
        run: |
          echo "MC live oracle was explicitly required, but the harness/server directory is unavailable."
          exit 1

      - name: Run live MC core oracle
        if: steps.live-env.outputs.configured == 'true'
        run: npm run test:mc-core:live
        env:
          MC_CORE_REQUIRE_ONLINE: 'true'
