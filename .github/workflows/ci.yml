name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compiler:
    name: Compiler build + unit/static gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - name: Unit tests only (no Paper / external docs checkout)
        run: npx jest --selectProjects unit --runInBand
        env:
          MC_OFFLINE: "true"
      - name: Static MC command syntax gate
        run: npm run validate-mc
      - name: Evidence-only experimental LIR local-copy no-regression gate
        run: npm run gate:lir-local-copy
