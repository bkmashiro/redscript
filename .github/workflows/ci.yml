name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout redscript-docs
        uses: actions/checkout@v4
        with:
          repository: bkmashiro/redscript-docs
          path: redscript-docs
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm test
      - name: Run MC integration tests (offline - graceful skip)
        run: npx jest --testPathPattern="mc-integration" --forceExit
        env:
          MC_OFFLINE: "true"
      - name: Check stdlib docs are up to date
        run: npx ts-node scripts/gen-docs.ts --check --docs-dir redscript-docs

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
