name: Docs Check

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

jobs:
  docs:
    name: Generated stdlib docs drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Checkout redscript-docs
        uses: actions/checkout@v4
        with:
          repository: bkmashiro/redscript-docs
          path: redscript-docs

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Check stdlib docs are up to date
        run: npx ts-node scripts/gen-docs.ts --check --docs-dir redscript-docs
