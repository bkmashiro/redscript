name: 🐛 Bug Report
description: Report a bug in RedScript
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
        
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: Code to Reproduce
      description: Minimal RedScript code that triggers the bug
      render: rust
      placeholder: |
        fn example() {
            // your code here
        }
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
      
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
      
  - type: input
    id: version
    attributes:
      label: RedScript Version
      description: Run `redscript --version`
      placeholder: "1.0.0"
    validations:
      required: true
      
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
      
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (error messages, stack traces, etc.)
