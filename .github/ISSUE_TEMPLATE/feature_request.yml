name: ✨ Feature Request
description: Suggest a new feature for RedScript
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature idea! Please describe it below.
        
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like RedScript to solve this?
      placeholder: |
        I'd like a syntax like:
        ```rs
        // example code
        ```
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?
      
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Language Feature
        - Builtin Function
        - Standard Library
        - CLI / Tooling
        - VSCode Extension
        - Documentation
        - Other
    validations:
      required: true
      
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, examples, or screenshots
